{% extends "base.html" %}
{% block page_nav %}
<a href="/writings" class="back-link">← Writings</a>
{% endblock %}
{% block content %}
<div class="article">
    <h1 class="title">{{ article.title }}</h1>
    <p class="meta">{{ article.date.strftime('%B %d, %Y') }}</p>
    <hr class="divider">
    {{ article.content }}
</div>
{% endblock content %}
