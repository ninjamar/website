{% extends "photo/photo_template.html" %}

{% block page_nav %}
<a href="/photos" class="back-link">← Photography</a>
{% endblock %}

{% block photo_content %}

<div class="image-lanes">
{% for photo in photos_from_dir(page.photo_dir) %}
    <a class="lane-photo photo-lightbox" href="{{ photo.url }}" data-gallery="1" data-title="{{ photo.caption }}">
        <img src="{{ photo.thumb_url }}">
    </a>
{% endfor %}
</div>

{% endblock photo_content %}
