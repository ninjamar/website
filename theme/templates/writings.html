{% extends "base.html" %}
{% block content %}
<div class="article">
    <h1 class="title">Writings</h1>
    {% for article in articles %}
    <div class="writing-entry">
        <a href="/{{ article.url }}"><h2>{{ article.title }}</h2></a>
        <p class="meta">{{ article.date.strftime('%b %Y') }}</p>
    </div>
    {% endfor %}
</div>
{% endblock content %}
